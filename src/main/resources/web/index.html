<!doctype html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>myImageFilter - tri local</title>
  <link rel="stylesheet" href="/styles.css" />
</head>
<body>
  <header class="topbar">
    <div class="path-editor">
      <input id="folderPathInput" class="path-input" type="text" aria-label="Dossier courant" />
      <button id="openFolderBtn" type="button">Ouvrir</button>
    </div>
    <div id="imageCount" class="count"></div>
  </header>

  <section class="controls">
    <label>Dossier Keep</label>
    <input id="keepDirInput" type="text" placeholder="Choisir un dossier Keep" />
    <button id="saveKeepBtn">Enregistrer</button>
  </section>

  <main>
    <div id="grid" class="grid" tabindex="0"></div>
  </main>

  <div id="viewer" class="viewer hidden">
    <div class="viewer-controls">
      <div id="viewerToolbar" class="viewer-toolbar">Échap: retour mosaïque • ←/→ navigation • Suppr supprimer • 1/2/3/4 keep • Backspace/Échap (mosaïque): dossier parent</div>
      <button id="stretchToggleBtn" class="stretch-toggle" type="button" aria-pressed="false">Mode étiré: OFF</button>
    </div>
    <img id="viewerImage" alt="Photo" />
    <div id="keepActions" class="keep-actions hidden">
      <button type="button" class="keep-action keep-normal" data-keep-variant="normal"><span class="key">1</span><span class="label">KEEP</span></button>
      <button type="button" class="keep-action keep-back" data-keep-variant="back"><span class="key">2</span><span class="label">KEEP _back</span></button>
      <button type="button" class="keep-action keep-instruction" data-keep-variant="instruction"><span class="key">3</span><span class="label">KEEP _instructions</span></button>
      <button type="button" class="keep-action keep-divers" data-keep-variant="divers"><span class="key">4</span><span class="label">KEEP _divers</span></button>
    </div>
  </div>

  <div id="toast" class="toast hidden"></div>

  <script src="/app.js"></script>
</body>
</html>
